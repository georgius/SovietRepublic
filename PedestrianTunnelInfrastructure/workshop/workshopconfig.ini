$ITEM_DESC "Various pedestrian tunnel infrastructure.

Contains:

- pedestrian tunnel X crossing (standard depth, 3.6m depth)
- pedestrian tunnel T crossing (standard depth, 3.6m depth)
- pedestrian tunnel corner (standard depth, 3.6m depth)
- tunnel X entry (3.6m depth)
- tunnel T entry (3.6m depth)
- tunnel corner entry (3.6m depth)
- tunnel straight entry (3.6m depth)
- tunnel L entry (3.6m depth)
- double tunnel X entry (3.6m depth)
- double tunnel L entry (3.6m depth)
- metro stations with tunnel connections (3.6m depth)
- tram stations with tunnel connections (3.6m depth)

NOTE:
Because of game limitations, while building crossings from resources, the buildings MUST BE connected to pedestrian path or use helicopters. The pedestrian path after completing buildings can be safely removed.
The tunnels for 3.6m depth infrastructure has to be planned or placed before anything else. Otherwise tunnels connecting to these parts will be in collision with other objects.

NOTE:
Even metro and tram stations are tagged as no collision objects, some hiccups still occur. The underground part is not considered by game, you cannot overlap tram station on metro station. If possible, try to plan infrastructure from metro (place metro stations and connect them with metro tunnels), then place trams stations, then create tunnel network around stations and then plan roads or sidewalks.

NOTE:
Tram stations have disabled pedestrian entry through road. Connect trams stations with tunnels.

