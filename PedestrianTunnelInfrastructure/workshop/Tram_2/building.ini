-- x4 y4 z4
-- describes tram track axis vectors A = [x1 - x2, y1 - y2, z1 - z2], B = [x3 - x4, y3 - y4, z3 - z4]
-- tram track starts on S = [x1, y1, z1] in direction of vector A, ends on E = [x3, y3, z3] in direction of B
-- tram track is drawn between points S a E


